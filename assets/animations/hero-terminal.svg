<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated terminal banner</title>
  <desc id="desc">A terminal-themed animated banner for a GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04131C">
        <animate attributeName="stop-color" values="#04131C;#0B1F2A;#04131C" dur="7s" repeatCount="indefinite" />
      </stop>
      <stop offset="1" stop-color="#0A2230">
        <animate attributeName="stop-color" values="#0A2230;#12384A;#0A2230" dur="7s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <linearGradient id="frame" x1="56" y1="34" x2="944" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#64FFDA;#22D3EE" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="1" stop-color="#64FFDA">
        <animate attributeName="stop-color" values="#64FFDA;#22D3EE;#64FFDA" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <linearGradient id="scan" x1="56" y1="0" x2="944" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0" />
      <stop offset="0.5" stop-color="#64FFDA" stop-opacity="0.75" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#1B4B5F" stroke-width="1" opacity="0.35" />
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="260" rx="24" fill="url(#bg)" />
  <rect width="1000" height="260" rx="24" fill="url(#grid)" opacity="0.25" />

  <circle cx="128" cy="60" r="6" fill="#FF6B6B">
    <animate attributeName="opacity" values="1;0.45;1" dur="2.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="152" cy="60" r="6" fill="#FFD166">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="176" cy="60" r="6" fill="#64FFDA">
    <animate attributeName="opacity" values="1;0.45;1" dur="2.2s" begin="0.4s" repeatCount="indefinite" />
  </circle>

  <rect x="56" y="34" width="888" height="192" rx="22" fill="#071A24" stroke="url(#frame)" stroke-width="2.5" filter="url(#glow)" />
  <rect x="56" y="34" width="888" height="36" rx="22" fill="#0D2835" />
  <rect x="56" y="52" width="888" height="1" fill="#1E4C5E" opacity="0.8" />

  <rect x="72" y="92" width="856" height="8" rx="4" fill="url(#scan)" opacity="0.4">
    <animate attributeName="y" values="92;182;92" dur="6s" repeatCount="indefinite" />
  </rect>

  <text x="92" y="108" fill="#64FFDA" font-family="monospace" font-size="20">$ whoami</text>
  <text x="92" y="142" fill="#E6FFFB" font-family="monospace" font-size="34" font-weight="700">Manjunatha P</text>
  <text x="92" y="174" fill="#9EDAE5" font-family="monospace" font-size="18">backend developer --focus security --mode explore</text>
  <text x="92" y="202" fill="#7DD3FC" font-family="monospace" font-size="18">status: building systems, learning security, solving problems</text>

  <rect x="768" y="187" width="11" height="18" fill="#64FFDA">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite" />
  </rect>

  <circle cx="832" cy="126" r="3" fill="#22D3EE" opacity="0.8">
    <animate attributeName="cy" values="126;118;126" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="864" cy="154" r="3" fill="#64FFDA" opacity="0.8">
    <animate attributeName="cy" values="154;146;154" dur="2.6s" repeatCount="indefinite" />
  </circle>
  <circle cx="896" cy="182" r="3" fill="#22D3EE" opacity="0.8">
    <animate attributeName="cy" values="182;174;182" dur="2.8s" repeatCount="indefinite" />
  </circle>
</svg>
