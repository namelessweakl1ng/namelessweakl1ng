<svg width="1000" height="30" viewBox="0 0 1000 30" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated cyber divider</title>
  <desc id="desc">An animated glowing divider with a moving scanner line.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="15" x2="1000" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A" />
      <stop offset="0.2" stop-color="#22D3EE" />
      <stop offset="0.5" stop-color="#64FFDA" />
      <stop offset="0.8" stop-color="#22D3EE" />
      <stop offset="1" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="15" x2="160" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0" />
      <stop offset="0.5" stop-color="#64FFDA" stop-opacity="0.95" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="30" rx="15" fill="#07131B" />
  <line x1="24" y1="15" x2="976" y2="15" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" />

  <g>
    <rect x="-160" y="8" width="160" height="14" rx="7" fill="url(#scan)" filter="url(#glow)">
      <animate attributeName="x" values="-160;1000" dur="4.2s" repeatCount="indefinite" />
    </rect>
  </g>

  <circle cx="220" cy="15" r="2.4" fill="#22D3EE">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="15" r="2.4" fill="#64FFDA">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.1s" repeatCount="indefinite" />
  </circle>
  <circle cx="780" cy="15" r="2.4" fill="#22D3EE">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="1.9s" repeatCount="indefinite" />
  </circle>
</svg>
